name: stratus-ceph-client

services:
  s3client:
    image: ${S3CLIENT_IMAGE:-rclone/rclone:1.74.4}
    entrypoint: ["sleep", "infinity"]
    environment:
      RCLONE_CONFIG_CEPHRGW_TYPE: s3
      RCLONE_CONFIG_CEPHRGW_PROVIDER: Ceph
      RCLONE_CONFIG_CEPHRGW_ACCESS_KEY_ID: ${CEPH_RGW_ACCESS_KEY:?CEPH_RGW_ACCESS_KEY is required}
      RCLONE_CONFIG_CEPHRGW_SECRET_ACCESS_KEY: ${CEPH_RGW_SECRET_KEY:?CEPH_RGW_SECRET_KEY is required}
      RCLONE_CONFIG_CEPHRGW_ENDPOINT: ${CEPH_RGW_ENDPOINT:?CEPH_RGW_ENDPOINT is required}
      RCLONE_CONFIG_CEPHRGW_FORCE_PATH_STYLE: ${S3_PATH_STYLE_ACCESS:-true}
    volumes:
      - ./certs/stratus-ca.crt:/certs/stratus-ca.crt:ro
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true

  verifier:
    image: ${VERIFIER_IMAGE:-stratus/storage-contract-verifier:dev}
    build:
      context: ../../..
      dockerfile: verification/storage-contract/image/Dockerfile
      args:
        TEMURIN_IMAGE: ${TEMURIN_IMAGE:-eclipse-temurin:25.0.3_9-jre-noble}
    command: ["sleep", "infinity"]
    environment:
      CEPH_RGW_ENDPOINT: ${CEPH_RGW_ENDPOINT:?CEPH_RGW_ENDPOINT is required}
      CEPH_RGW_ACCESS_KEY: ${CEPH_RGW_ACCESS_KEY:?CEPH_RGW_ACCESS_KEY is required}
      CEPH_RGW_SECRET_KEY: ${CEPH_RGW_SECRET_KEY:?CEPH_RGW_SECRET_KEY is required}
      CEPH_RGW_PROBE_BUCKET: ${CEPH_RGW_PROBE_BUCKET:-stratus-landing}
      CEPH_RGW_ALLOW_HTTP: ${CEPH_RGW_ALLOW_HTTP:-false}
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-true}
      USE_SYSTEM_CA_CERTS: ${USE_SYSTEM_CA_CERTS-1}
    volumes:
      - ./certs/stratus-ca.crt:/certificates/stratus-ca.crt:ro
      - ./evidence:/evidence
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
