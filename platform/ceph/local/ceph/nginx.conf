events {}

http {
    access_log /dev/stdout;
    error_log /dev/stderr notice;

    upstream ceph_rgw {
        least_conn;
        server rgw1:8080 max_fails=2 fail_timeout=5s;
        server rgw2:8080 max_fails=2 fail_timeout=5s;
    }

    server {
        listen 8443 ssl;
        server_name object-store.stratus.local;

        ssl_certificate /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        client_max_body_size 0;
        # Generous upstream timeouts so long multipart part uploads and large
        # GETs are not cut off at the 60s nginx defaults.
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_request_headers on;

        location / {
            proxy_pass http://ceph_rgw;
        }
    }
}
