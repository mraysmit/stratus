name: stratus-ceph-local

# Local developer harness only. Two patterns here are deliberate local
# shortcuts and must not be replicated in lab or production deployments:
# credentials injected as plain environment variables (use file-based secrets
# there), and the full-privilege admin keyring shared with every daemon via
# the ceph-config volume (distribute per-daemon keyrings there).
x-ceph-image: &ceph-image ${CEPH_IMAGE:-quay.io/ceph/ceph:v20.2.2@sha256:6b4b5ae33acd3d736eb26d2a19238bce71a22f9cfb99cca887ba6312d0957644}

services:
  ceph-bootstrap:
    image: *ceph-image
    entrypoint: ["/bin/bash", "/opt/stratus/bootstrap.sh"]
    volumes:
      - ./ceph/bootstrap.sh:/opt/stratus/bootstrap.sh:ro
      - ceph-config:/etc/ceph
      - mon1-data:/var/lib/ceph/mon1
      - mon2-data:/var/lib/ceph/mon2
      - mon3-data:/var/lib/ceph/mon3
    networks:
      - ceph
    restart: "no"

  mon1:
    image: *ceph-image
    hostname: mon1
    entrypoint: ["/bin/bash", "/opt/stratus/daemon.sh"]
    restart: unless-stopped
    environment:
      DAEMON_TYPE: mon
      DAEMON_ID: mon1
      MON_IP: 172.28.0.11
    depends_on:
      ceph-bootstrap:
        condition: service_completed_successfully
    volumes:
      - ./ceph/daemon.sh:/opt/stratus/daemon.sh:ro
      - ceph-config:/etc/ceph:ro
      - mon1-data:/var/lib/ceph/mon/ceph-mon1
    networks:
      ceph:
        ipv4_address: 172.28.0.11
    healthcheck:
      test: ["CMD-SHELL", "ceph quorum_status --format json | jq -e '.quorum | length == 3' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  mon2:
    image: *ceph-image
    hostname: mon2
    entrypoint: ["/bin/bash", "/opt/stratus/daemon.sh"]
    restart: unless-stopped
    environment:
      DAEMON_TYPE: mon
      DAEMON_ID: mon2
      MON_IP: 172.28.0.12
    depends_on:
      ceph-bootstrap:
        condition: service_completed_successfully
    volumes:
      - ./ceph/daemon.sh:/opt/stratus/daemon.sh:ro
      - ceph-config:/etc/ceph:ro
      - mon2-data:/var/lib/ceph/mon/ceph-mon2
    networks:
      ceph:
        ipv4_address: 172.28.0.12
    healthcheck:
      test: ["CMD-SHELL", "ceph quorum_status --format json | jq -e '.quorum | length == 3' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  mon3:
    image: *ceph-image
    hostname: mon3
    entrypoint: ["/bin/bash", "/opt/stratus/daemon.sh"]
    restart: unless-stopped
    environment:
      DAEMON_TYPE: mon
      DAEMON_ID: mon3
      MON_IP: 172.28.0.13
    depends_on:
      ceph-bootstrap:
        condition: service_completed_successfully
    volumes:
      - ./ceph/daemon.sh:/opt/stratus/daemon.sh:ro
      - ceph-config:/etc/ceph:ro
      - mon3-data:/var/lib/ceph/mon/ceph-mon3
    networks:
      ceph:
        ipv4_address: 172.28.0.13
    healthcheck:
      test: ["CMD-SHELL", "ceph quorum_status --format json | jq -e '.quorum | length == 3' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  mgr1:
    image: *ceph-image
    hostname: mgr1
    entrypoint: ["/bin/bash", "/opt/stratus/daemon.sh"]
    restart: unless-stopped
    environment:
      DAEMON_TYPE: mgr
      DAEMON_ID: mgr1
    depends_on:
      mon1: {condition: service_healthy}
      mon2: {condition: service_healthy}
      mon3: {condition: service_healthy}
    volumes:
      - ./ceph/daemon.sh:/opt/stratus/daemon.sh:ro
      - ceph-config:/etc/ceph:ro
      - mgr1-data:/var/lib/ceph/mgr/ceph-mgr1
    networks:
      ceph:
        ipv4_address: 172.28.0.21
    healthcheck:
      test: ["CMD-SHELL", "pgrep ceph-mgr >/dev/null && ceph mgr dump --format json | jq -e '.active_name != \"\"' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  mgr2:
    image: *ceph-image
    hostname: mgr2
    entrypoint: ["/bin/bash", "/opt/stratus/daemon.sh"]
    restart: unless-stopped
    environment:
      DAEMON_TYPE: mgr
      DAEMON_ID: mgr2
    depends_on:
      mon1: {condition: service_healthy}
      mon2: {condition: service_healthy}
      mon3: {condition: service_healthy}
    volumes:
      - ./ceph/daemon.sh:/opt/stratus/daemon.sh:ro
      - ceph-config:/etc/ceph:ro
      - mgr2-data:/var/lib/ceph/mgr/ceph-mgr2
    networks:
      ceph:
        ipv4_address: 172.28.0.22
    healthcheck:
      test: ["CMD-SHELL", "pgrep ceph-mgr >/dev/null && ceph mgr dump --format json | jq -e '.active_name != \"\"' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  osd1:
    image: *ceph-image
    hostname: osd1
    entrypoint: ["/bin/bash", "/opt/stratus/daemon.sh"]
    restart: unless-stopped
    environment:
      DAEMON_TYPE: osd
      DAEMON_ID: "0"
    depends_on:
      mon1: {condition: service_healthy}
      mon2: {condition: service_healthy}
      mon3: {condition: service_healthy}
    volumes:
      - ./ceph/daemon.sh:/opt/stratus/daemon.sh:ro
      - ceph-config:/etc/ceph:ro
      - osd1-data:/var/lib/ceph/osd/ceph-0
    networks:
      ceph:
        ipv4_address: 172.28.0.31
    healthcheck:
      test: ["CMD-SHELL", "ceph osd dump | grep -Eq '^osd\\.0 +up +in '"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 30s

  osd2:
    image: *ceph-image
    hostname: osd2
    entrypoint: ["/bin/bash", "/opt/stratus/daemon.sh"]
    restart: unless-stopped
    environment:
      DAEMON_TYPE: osd
      DAEMON_ID: "1"
    depends_on:
      mon1: {condition: service_healthy}
      mon2: {condition: service_healthy}
      mon3: {condition: service_healthy}
    volumes:
      - ./ceph/daemon.sh:/opt/stratus/daemon.sh:ro
      - ceph-config:/etc/ceph:ro
      - osd2-data:/var/lib/ceph/osd/ceph-1
    networks:
      ceph:
        ipv4_address: 172.28.0.32
    healthcheck:
      test: ["CMD-SHELL", "ceph osd dump | grep -Eq '^osd\\.1 +up +in '"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 30s

  osd3:
    image: *ceph-image
    hostname: osd3
    entrypoint: ["/bin/bash", "/opt/stratus/daemon.sh"]
    restart: unless-stopped
    environment:
      DAEMON_TYPE: osd
      DAEMON_ID: "2"
    depends_on:
      mon1: {condition: service_healthy}
      mon2: {condition: service_healthy}
      mon3: {condition: service_healthy}
    volumes:
      - ./ceph/daemon.sh:/opt/stratus/daemon.sh:ro
      - ceph-config:/etc/ceph:ro
      - osd3-data:/var/lib/ceph/osd/ceph-2
    networks:
      ceph:
        ipv4_address: 172.28.0.33
    healthcheck:
      test: ["CMD-SHELL", "ceph osd dump | grep -Eq '^osd\\.2 +up +in '"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 30s

  ceph-configure:
    image: *ceph-image
    entrypoint: ["/bin/bash", "/opt/stratus/configure.sh"]
    environment:
      CEPH_DEMO_UID: ${CEPH_DEMO_UID:-stratus-verifier}
      CEPH_DEMO_ACCESS_KEY: ${CEPH_RGW_ACCESS_KEY:?CEPH_RGW_ACCESS_KEY is required}
      CEPH_DEMO_SECRET_KEY: ${CEPH_RGW_SECRET_KEY:?CEPH_RGW_SECRET_KEY is required}
      CEPH_DENIED_UID: ${CEPH_DENIED_UID:?CEPH_DENIED_UID is required}
      CEPH_DENIED_ACCESS_KEY: ${CEPH_DENIED_ACCESS_KEY:?CEPH_DENIED_ACCESS_KEY is required}
      CEPH_DENIED_SECRET_KEY: ${CEPH_DENIED_SECRET_KEY:?CEPH_DENIED_SECRET_KEY is required}
      CEPH_DASHBOARD_USER: ${CEPH_DASHBOARD_USER:?CEPH_DASHBOARD_USER is required}
      CEPH_DASHBOARD_PASSWORD: ${CEPH_DASHBOARD_PASSWORD:?CEPH_DASHBOARD_PASSWORD is required}
    depends_on:
      osd1: {condition: service_healthy}
      osd2: {condition: service_healthy}
      osd3: {condition: service_healthy}
    volumes:
      - ./ceph/configure.sh:/opt/stratus/configure.sh:ro
      - ceph-config:/etc/ceph:ro
    networks:
      - ceph
    restart: "no"

  rgw1:
    image: *ceph-image
    hostname: rgw1
    entrypoint: ["/bin/bash", "/opt/stratus/daemon.sh"]
    restart: unless-stopped
    environment:
      DAEMON_TYPE: rgw
      DAEMON_ID: rgw1
    depends_on:
      ceph-configure:
        condition: service_completed_successfully
    volumes:
      - ./ceph/daemon.sh:/opt/stratus/daemon.sh:ro
      - ceph-config:/etc/ceph:ro
      - rgw1-data:/var/lib/ceph/radosgw/ceph-rgw.rgw1
    networks:
      ceph:
        ipv4_address: 172.28.0.41
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  rgw2:
    image: *ceph-image
    hostname: rgw2
    entrypoint: ["/bin/bash", "/opt/stratus/daemon.sh"]
    restart: unless-stopped
    environment:
      DAEMON_TYPE: rgw
      DAEMON_ID: rgw2
    depends_on:
      ceph-configure:
        condition: service_completed_successfully
    volumes:
      - ./ceph/daemon.sh:/opt/stratus/daemon.sh:ro
      - ceph-config:/etc/ceph:ro
      - rgw2-data:/var/lib/ceph/radosgw/ceph-rgw.rgw2
    networks:
      ceph:
        ipv4_address: 172.28.0.42
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  rgw-proxy:
    image: ${RGW_PROXY_IMAGE:-nginx:1.29.8-alpine}
    restart: unless-stopped
    depends_on:
      rgw1: {condition: service_healthy}
      rgw2: {condition: service_healthy}
      mgr1: {condition: service_healthy}
      mgr2: {condition: service_healthy}
    volumes:
      - ./ceph/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/object-store.stratus.local.crt:/etc/nginx/tls/tls.crt:ro
      - ./private/object-store.stratus.local.key:/etc/nginx/tls/tls.key:ro
    ports:
      # Loopback-only by default; the harness serves well-known local credentials.
      # Set CEPH_RGW_BIND_ADDRESS=0.0.0.0 only when remote access is deliberate.
      - "${CEPH_RGW_BIND_ADDRESS:-127.0.0.1}:${CEPH_RGW_PORT:-8443}:8443"
      # Ceph Dashboard (management console), TLS-terminated here and forwarded
      # to the active manager. Same loopback-only default as the S3 port.
      - "${CEPH_DASHBOARD_BIND_ADDRESS:-127.0.0.1}:${CEPH_DASHBOARD_PORT:-8444}:8444"
    networks:
      ceph:
        aliases:
          - object-store.stratus.local
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8443"]
      interval: 5s
      timeout: 3s
      retries: 20

  s3client:
    image: ${S3CLIENT_IMAGE:-rclone/rclone:1.74.4}
    entrypoint: ["sleep", "infinity"]
    restart: unless-stopped
    depends_on:
      rgw-proxy: {condition: service_healthy}
    environment:
      RCLONE_CONFIG: /dev/null
      RCLONE_CONFIG_CEPHRGW_TYPE: s3
      RCLONE_CONFIG_CEPHRGW_PROVIDER: Ceph
      RCLONE_CONFIG_CEPHRGW_ACCESS_KEY_ID: ${CEPH_RGW_ACCESS_KEY:?CEPH_RGW_ACCESS_KEY is required}
      RCLONE_CONFIG_CEPHRGW_SECRET_ACCESS_KEY: ${CEPH_RGW_SECRET_KEY:?CEPH_RGW_SECRET_KEY is required}
      RCLONE_CONFIG_CEPHRGW_ENDPOINT: ${CEPH_RGW_ENDPOINT:-https://object-store.stratus.local:8443}
      RCLONE_CONFIG_CEPHRGW_FORCE_PATH_STYLE: ${S3_PATH_STYLE_ACCESS:-true}
      RCLONE_CONFIG_DENIEDOWNER_TYPE: s3
      RCLONE_CONFIG_DENIEDOWNER_PROVIDER: Ceph
      RCLONE_CONFIG_DENIEDOWNER_ACCESS_KEY_ID: ${CEPH_DENIED_ACCESS_KEY:?CEPH_DENIED_ACCESS_KEY is required}
      RCLONE_CONFIG_DENIEDOWNER_SECRET_ACCESS_KEY: ${CEPH_DENIED_SECRET_KEY:?CEPH_DENIED_SECRET_KEY is required}
      RCLONE_CONFIG_DENIEDOWNER_ENDPOINT: ${CEPH_RGW_ENDPOINT:-https://object-store.stratus.local:8443}
      RCLONE_CONFIG_DENIEDOWNER_FORCE_PATH_STYLE: ${S3_PATH_STYLE_ACCESS:-true}
    volumes:
      - ./certs/stratus-ca.crt:/certs/stratus-ca.crt:ro
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    networks:
      - ceph

  verifier:
    image: ${VERIFIER_IMAGE:?VERIFIER_IMAGE must identify a prebuilt verifier image}
    profiles: ["verification"]
    environment:
      CEPH_RGW_ENDPOINT: ${CEPH_RGW_ENDPOINT:-https://object-store.stratus.local:8443}
      CEPH_RGW_ACCESS_KEY: ${CEPH_RGW_ACCESS_KEY:?CEPH_RGW_ACCESS_KEY is required}
      CEPH_RGW_SECRET_KEY: ${CEPH_RGW_SECRET_KEY:?CEPH_RGW_SECRET_KEY is required}
      CEPH_RGW_PROBE_BUCKET: ${CEPH_RGW_PROBE_BUCKET:-stratus-landing}
      CEPH_RGW_DENIED_BUCKET: ${CEPH_RGW_DENIED_BUCKET:-stratus-denied}
      CEPH_RGW_ALLOW_HTTP: "false"
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-true}
      S3_CONNECTION_TIMEOUT_MS: ${S3_CONNECTION_TIMEOUT_MS:-5000}
      S3_SOCKET_TIMEOUT_MS: ${S3_SOCKET_TIMEOUT_MS:-10000}
      S3_API_CALL_ATTEMPT_TIMEOUT_MS: ${S3_API_CALL_ATTEMPT_TIMEOUT_MS:-15000}
      S3_API_CALL_TIMEOUT_MS: ${S3_API_CALL_TIMEOUT_MS:-30000}
      USE_SYSTEM_CA_CERTS: "1"
      STRATUS_LOG_LEVEL: ${STRATUS_LOG_LEVEL:-INFO}
      STRATUS_LOG_FILE: ${STRATUS_LOG_FILE:-/evidence/storage-verifier.%g.log}
      STRATUS_LOG_MAX_BYTES: ${STRATUS_LOG_MAX_BYTES:-10485760}
      STRATUS_LOG_FILE_COUNT: ${STRATUS_LOG_FILE_COUNT:-5}
    volumes:
      - ./certs/stratus-ca.crt:/certificates/stratus-ca.crt:ro
      - ./evidence:/evidence
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    networks:
      - ceph

  verifier-untrusted:
    image: ${VERIFIER_IMAGE:?VERIFIER_IMAGE must identify a prebuilt verifier image}
    profiles: ["verification"]
    environment:
      CEPH_RGW_ENDPOINT: ${CEPH_RGW_ENDPOINT:-https://object-store.stratus.local:8443}
      CEPH_RGW_ACCESS_KEY: ${CEPH_RGW_ACCESS_KEY:?CEPH_RGW_ACCESS_KEY is required}
      CEPH_RGW_SECRET_KEY: ${CEPH_RGW_SECRET_KEY:?CEPH_RGW_SECRET_KEY is required}
      CEPH_RGW_PROBE_BUCKET: ${CEPH_RGW_PROBE_BUCKET:-stratus-landing}
      CEPH_RGW_ALLOW_HTTP: "false"
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-true}
      S3_CONNECTION_TIMEOUT_MS: ${S3_CONNECTION_TIMEOUT_MS:-5000}
      S3_SOCKET_TIMEOUT_MS: ${S3_SOCKET_TIMEOUT_MS:-10000}
      S3_API_CALL_ATTEMPT_TIMEOUT_MS: ${S3_API_CALL_ATTEMPT_TIMEOUT_MS:-15000}
      S3_API_CALL_TIMEOUT_MS: ${S3_API_CALL_TIMEOUT_MS:-30000}
      STRATUS_LOG_LEVEL: ${STRATUS_LOG_LEVEL:-INFO}
      STRATUS_LOG_FILE: /tmp/storage-verifier.%g.log
      STRATUS_LOG_MAX_BYTES: ${STRATUS_LOG_MAX_BYTES:-10485760}
      STRATUS_LOG_FILE_COUNT: ${STRATUS_LOG_FILE_COUNT:-5}
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    networks:
      - ceph

networks:
  ceph:
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  ceph-config:
  mon1-data:
  mon2-data:
  mon3-data:
  mgr1-data:
  mgr2-data:
  osd1-data:
  osd2-data:
  osd3-data:
  rgw1-data:
  rgw2-data:
