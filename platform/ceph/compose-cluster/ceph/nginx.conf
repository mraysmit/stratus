events {}

http {
    access_log /dev/stdout;
    error_log /dev/stderr notice;

    # Shared TLS settings for both published endpoints (S3 and dashboard).
    ssl_certificate /etc/nginx/tls/tls.crt;
    ssl_certificate_key /etc/nginx/tls/tls.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    upstream ceph_rgw {
        least_conn;
        server rgw1:8080 max_fails=2 fail_timeout=5s;
        server rgw2:8080 max_fails=2 fail_timeout=5s;
    }

    # The dashboard is served only by the active manager; the standby answers
    # HTTP 500 (mgr/dashboard/standby_behaviour=error), so retrying on
    # http_500 always lands the request on the active one.
    upstream ceph_dashboard {
        server mgr1:8500 max_fails=2 fail_timeout=5s;
        server mgr2:8500 max_fails=2 fail_timeout=5s;
    }

    server {
        listen 8443 ssl;
        server_name object-store.stratus.local;

        client_max_body_size 0;
        # Generous upstream timeouts so long multipart part uploads and large
        # GETs are not cut off at the 60s nginx defaults.
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_request_headers on;

        location / {
            proxy_pass http://ceph_rgw;
        }
    }

    server {
        listen 8444 ssl;
        server_name object-store.stratus.local;

        proxy_connect_timeout 10s;
        proxy_read_timeout 90s;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        location / {
            proxy_pass http://ceph_dashboard;
            # non_idempotent: POSTs must also fail over, because the standby
            # manager answers every request with 500 and no side effects.
            proxy_next_upstream error timeout http_500 http_502 http_503 non_idempotent;
        }
    }
}
